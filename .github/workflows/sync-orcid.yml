name: Sync ORCID publication metadata

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync public ORCID publication metadata
        run: node scripts/sync-orcid.js

      - name: Commit updated metadata
        run: |
          if git diff --quiet -- publications.json script.js; then
            echo "No ORCID publication metadata changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add publications.json script.js
            git commit -m "Update ORCID publication metadata"
            git push
          fi
